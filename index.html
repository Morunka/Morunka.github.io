<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Rose Code</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Russo+One&display=swap" rel="stylesheet">
</head>
<body>
    <div id="preloader">
        <div class="loader"></div>
    </div>

    <div class="header-container">
        <h1>Black Rose Code</h1>
        <div class="button-container">
            <a href="#" class="button" id="about-btn">О студии</a>
            <a href="#" class="button" id="links-btn">Связи</a>
            <a href="#" class="button" id="docs-btn">Документы</a>
            <a href="#" class="button" id="dev-btn">Разработка</a>
            <a href="#" class="button" id="team-btn">Команда</a>
            <a href="#" class="button" id="extensions-btn">Расширения</a>
            <a href="#" class="button" id="games-btn">Игры</a>
            <a href="#" class="button" id="utils-btn">Утилиты</a>
        </div>
    </div>

    <div class="description-container" id="description">
        <p class="description">Мы — <strong>Black Rose Code</strong>, студия разработки игр и утилит. Создаём проекты с душой с 2023 года.</p>
    </div>

    <div class="links-container" id="links">
        <div class="links-row">
            <a href="https://gamejolt.com/@BlackRoseCode" class="link-icon gamejolt"></a>
            <a href="https://www.kogama.com/profile/6641591" class="link-icon kogama"></a>
            <a href="https://www.youtube.com/@BlackRoseCode" class="link-icon youtube"></a>
            <a href="#" class="link-icon telegram" id="telegram-btn"></a>
            <a href="https://scratch.mit.edu/users/BlackRoseCode" class="link-icon scratch"></a>
            <div class="telegram-links">
                <a href="https://t.me/BlackRoseCode" class="telegram-link">Канал</a>
                <a href="https://t.me/BlackRoseCodeChat" class="telegram-link">Чат</a>
                <a href="https://t.me/MEOW_MUR920" class="telegram-link">Админ</a>
            </div>
        </div>
    </div>

    <div class="docs-container" id="docs">
        <div class="docs-row">
            <a href="license.txt" class="link-icon license"></a>
            <a href="characters.txt" class="link-icon characters"></a>
        </div>
    </div>

    <div class="dev-container" id="dev">
        <div class="dev-info"></div>
    </div>

    <div class="team-container" id="team">
        <div class="team-list"></div>
    </div>

    <div class="extensions-container" id="extensions">
        <div class="extensions-list"></div>
    </div>

    <div class="games-container" id="games">
        <div class="games-header">
            <button class="category-btn active" id="horror-btn">Хоррор</button>
            <button class="category-btn" id="others-btn">Прочее</button>
            <input type="text" id="year-filter" class="filter-input" placeholder="Год">
            <select id="engine-filter" class="filter-select">
                <option value="all">Все движки</option>
                <option value="Unity">Unity</option>
                <option value="Unreal">Unreal</option>
                <option value="Scratch">Scratch</option>
            </select>
            <select id="sort-games" class="filter-select">
                <option value="name-asc">Название (А-Я)</option>
                <option value="name-desc">Название (Я-А)</option>
                <option value="year-asc">Год (возр.)</option>
                <option value="year-desc">Год (убыв.)</option>
            </select>
        </div>
        <div class="games-list" id="games-list"></div>
        <div class="pagination">
            <button class="page-btn" id="prev-page">Назад</button>
            <span class="page-info" id="page-info">Страница 1 из 1</span>
            <button class="page-btn" id="next-page">Вперёд</button>
        </div>
    </div>

    <div class="utils-container" id="utils">
        <div class="utils-header">
            <button class="category-btn active" id="our-utils-btn">Наши утилиты</button>
            <button class="category-btn" id="other-utils-btn">Прочее</button>
        </div>
        <div class="utils-list" id="utils-list"></div>
    </div>

    <div class="search-container">
        <div class="search-buttons">
            <button class="search-btn yandex-btn active" data-engine="yandex"></button>
            <button class="search-btn brave-btn" data-engine="brave"></button>
            <button class="search-btn google-btn" data-engine="google"></button>
        </div>
        <div class="search-bar">
            <input type="text" id="search-input" class="search-input" placeholder="Поиск...">
            <button id="search-submit" class="search-submit"></button>
        </div>
    </div>

    <div class="scroll-buttons">
        <button class="scroll-button scroll-up">↑</button>
        <button class="scroll-button scroll-down">↓</button>
    </div>

    <div class="easter-egg">
        <img src="DDRH.png" alt="Easter Egg">
    </div>

    <footer class="footer">
        <p>© 2023-2025 Black Rose Code. Все права защищены.</p>
    </footer>

    <script src="scripts.js"></script>
</body>
</html>
