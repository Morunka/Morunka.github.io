<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>By ROlil Studio</title>
    <style>
        body {
            background-image: url('BRC-Background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }
        h1 {
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-size: 48px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
            margin-bottom: 20px;
        }
        .button-container {
            background-color: rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 10px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .button {
            display: inline-block;
            padding: 10px 20px;
            background-color: #333;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        .button:hover {
            background-color: #555;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <h1>By ROlil Studio</h1>
    <div class="button-container">
        <a href="about.html" class="button">О компании</a>
        <a href="links.html" class="button">Связи</a>
        <a href="docs.html" class="button">Документы</a>
        <a href="dev.html" class="button">Разработка</a>
        <a href="team.html" class="button">Команда</a>
    </div>
</body>
</html>
